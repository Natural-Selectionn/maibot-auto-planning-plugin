# AutoPlanning 插件默认配置示例

[plugin]
# 配置版本
config_version = "0.3.2"
# 是否启用插件全部功能
enabled = true

[schedule]
# 启用日程的聊天流白名单
# 支持:
# - "all" 启用所有已知聊天流
# - "session:<session_id>" 指定聊天流
# - "qq:group:<group_id>" 指定群聊账号
# - "qq:private:<user_id>" 指定私聊账号
# 空列表表示不启用任何聊天流
allowed_streams = []
# 解析 all 或账号白名单时扫描的平台，all_platforms 表示所有平台
stream_discovery_platform = "all_platforms"
# 每日生成时间 (HH:MM)
generation_time = "01:30"
# 生成日程使用的模型任务名，空字符串表示使用默认模型
schedule_generation_model = ""
# 人物设定来源: system | extra | both
persona_source = "both"
# 注入到日程生成 prompt 中的额外提示词
extra_generation_prompt = ""
# 日程生成 LLM 的最大输出 token 数
max_tokens = 16000
# 每日活动数量下限
activity_count_min = 8
# 每日活动数量上限
activity_count_max = 14
# 角色苏醒时间 (HH:MM)
wake_time = "08:30"
# 角色入睡时间 (HH:MM)
sleep_time = "01:00"
# 生成日程时读取的最近消息条数
history_message_limit = 30
# 生成日程时读取最近多少小时内的聊天消息
history_window_hours = 24
# 生成日程时检索当前聊天流相关记忆的条数
knowledge_search_limit = 5

[inject]
# 注入时间窗口 (分钟)
inject_window_minutes = 90
# 最多注入活动数量
max_injected_activities = 3
